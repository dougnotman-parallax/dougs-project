<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cognite MoonShot - Design Exploration</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        
        /* Aura Design System CSS Variables */
        :root {
            /* Typography */
            --font-inter: 'Inter', sans-serif;
            --font-weight-regular: 400;
            --font-weight-medium: 500;
            
            /* Text Sizes */
            --text-xs: 12px;
            --text-sm: 14px;
            --text-base: 16px;
            --text-2xl: 24px;
            
            /* Line Heights */
            --leading-14: 14px;
            --leading-18: 18px;
            --leading-20: 20px;
            --leading-28: 28px;
            
            /* Letter Spacing */
            --tracking-tightest: -0.1px;
            --tracking-tighter: -0.08px;
            --tracking-tight: -0.04px;
            --tracking-normal: 0px;
            
            /* Spacing Scale */
            --spacing-4: 4px;
            --spacing-8: 8px;
            --spacing-12: 12px;
            --spacing-16: 16px;
            --spacing-24: 24px;
            --spacing-48: 48px;
            
            /* Padding */
            --padding-4: 4px;
            --padding-6: 6px;
            --padding-8: 8px;
            --padding-12: 12px;
            --padding-16: 16px;
            
            /* Margin */
            --margin-8: 8px;
            --margin-12: 12px;
            --margin-16: 16px;
            --margin-40: 40px;
            
            /* Border Radius */
            --radius-xs: 2px;
            --radius-sm: 4px;
            --radius-md: 6px;
            --radius-lg: 8px;
            --radius-xl: 12px;
            --radius-2xl: 16px;
            
            /* Colors - Light Mode (default) */
            --foreground: #111213;
            --muted-foreground: #5e666d;
            --card-foreground: #111213;
            --background: white;
            --card: #f9fafa;
            --accent: #f1f2f3;
            --disabled: #f1f2f3;
            --border: #e4e6e8;
            --border-width-1: 1px;
            
            /* Decorative Colors */
            --decorative-background-nordic: #b4f2e5;
            --decorative-foreground-nordic: #0d4e40;
            --decorative-background-mountain: #e4e6e8;
            --decorative-foreground-mountain: #40464a;
            
            /* Interactive States */
            --toggled: #e2e5f4;
            --toggled-foreground: #32417f;
            
            /* Shadows */
            --shadow-lg: rgba(0, 0, 0, 0.06);
            --shadow-xl: rgba(0, 0, 0, 0.1);
        }
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: var(--font-inter);
            color: var(--foreground);
        }
        
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        .background-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.95) 0%, rgba(2, 6, 23, 0.98) 100%);
            z-index: 0;
            opacity: 0;
            transition: opacity 1s ease-out;
        }
        
        .gradient-overlay.visible {
            opacity: 1;
        }
        
        .ghost-button {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: var(--padding-16) calc(var(--padding-16) * 3);
            font-size: var(--text-2xl);
            font-weight: var(--font-weight-medium);
            font-family: var(--font-inter);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            letter-spacing: var(--tracking-tighter);
        }
        
        .ghost-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 2px;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.6),
                rgba(255, 255, 255, 1),
                rgba(255, 255, 255, 1),
                rgba(255, 255, 255, 0.6),
                transparent
            );
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.9), 0 0 12px rgba(255, 255, 255, 0.6);
            animation: shimmer-top 5s infinite;
            pointer-events: none;
            z-index: 10;
        }
        
        .ghost-button::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: -100%;
            width: 60%;
            height: 2px;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.6),
                rgba(255, 255, 255, 1),
                rgba(255, 255, 255, 1),
                rgba(255, 255, 255, 0.6),
                transparent
            );
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.9), 0 0 12px rgba(255, 255, 255, 0.6);
            animation: shimmer-bottom 5s infinite;
            pointer-events: none;
            z-index: 10;
        }
        
        @keyframes shimmer-top {
            0% {
                left: -100%;
            }
            8% {
                left: 150%;
            }
            100% {
                left: 150%;
            }
        }
        
        @keyframes shimmer-bottom {
            0% {
                left: -100%;
            }
            8% {
                left: 150%;
            }
            100% {
                left: 150%;
            }
        }
        
        .ghost-button:hover {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .ghost-button:hover::before {
            animation: shimmer-top 3s infinite;
        }
        
        .ghost-button:hover::after {
            animation: shimmer-bottom 3s infinite;
        }
        
        .home-content {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }
        
        .home-content.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .home-content.animate-delay-100 {
            transition-delay: 0.1s;
        }
        
        .home-content.animate-delay-200 {
            transition-delay: 0.2s;
        }
        
        .home-content.animate-delay-300 {
            transition-delay: 0.3s;
        }
        
        .home-content.animate-delay-400 {
            transition-delay: 0.4s;
        }
        
        .home-content.animate-delay-500 {
            transition-delay: 0.5s;
        }
        
        .home-content.animate-delay-600 {
            transition-delay: 0.6s;
        }
        
        .content {
            position: relative;
            z-index: 1;
            height: 100vh;
            overflow-y: auto;
        }
        
        /* Parallax animation styles */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
        }
        
        .animate-delay-100 {
            animation-delay: 0.1s;
        }
        
        .animate-delay-200 {
            animation-delay: 0.2s;
        }
        
        .animate-delay-300 {
            animation-delay: 0.3s;
        }
        
        .animate-delay-400 {
            animation-delay: 0.4s;
        }
        
        .animate-delay-500 {
            animation-delay: 0.5s;
        }
        
        .animate-delay-600 {
            animation-delay: 0.6s;
        }
        
        .animate-delay-700 {
            animation-delay: 0.7s;
        }
        
        .animate-delay-800 {
            animation-delay: 0.8s;
        }
        
        .animate-delay-900 {
            animation-delay: 0.9s;
        }
        
        .animate-delay-1000 {
            animation-delay: 1.0s;
        }
        
        /* Aura Design System Utility Classes */
        .aura-h1 {
            font-family: var(--font-inter);
            font-size: var(--text-2xl);
            font-weight: var(--font-weight-medium);
            line-height: var(--leading-28);
            letter-spacing: var(--tracking-tightest);
        }
        
        .aura-h3 {
            font-family: var(--font-inter);
            font-size: var(--text-base);
            font-weight: var(--font-weight-medium);
            line-height: var(--leading-20);
            letter-spacing: var(--tracking-tighter);
        }
        
        .aura-body {
            font-family: var(--font-inter);
            font-size: var(--text-base);
            font-weight: var(--font-weight-regular);
            line-height: var(--leading-20);
            letter-spacing: var(--tracking-tightest);
        }
        
        .aura-body-sm {
            font-family: var(--font-inter);
            font-size: var(--text-sm);
            font-weight: var(--font-weight-regular);
            line-height: var(--leading-18);
            letter-spacing: var(--tracking-tight);
        }
        
        .aura-body-xs {
            font-family: var(--font-inter);
            font-size: var(--text-xs);
            font-weight: var(--font-weight-regular);
            line-height: var(--leading-14);
            letter-spacing: var(--tracking-tightest);
        }
        
        .aura-label {
            font-family: var(--font-inter);
            font-size: var(--text-xs);
            font-weight: var(--font-weight-medium);
            line-height: var(--leading-14);
            letter-spacing: var(--tracking-tighter);
        }
        
        .aura-card {
            background-color: var(--card);
            border-radius: var(--radius-lg);
            padding: var(--padding-16);
        }
        
        .aura-button {
            font-family: var(--font-inter);
            font-size: var(--text-sm);
            font-weight: var(--font-weight-medium);
            line-height: var(--leading-18);
            letter-spacing: var(--tracking-normal);
            border-radius: var(--radius-sm);
            padding: var(--padding-8);
        }
     
    </style>
</head>
<body>
    <div class="background-container">
        <video 
            src="video/screen_1.mp4" 
            autoplay 
            loop 
            muted 
            playsinline 
            preload="auto"
            class="background-video"
            id="bg-video">
        </video>
    </div>
    <div class="gradient-overlay"></div>
    
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState } = React;

        // Icon Components
        const HomeIcon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 9L12 2L21 9V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V9Z" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M9 22V12H15V22" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
        );

        const ArrowLeft = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
        );

        const ArrowRight = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
        );

        const TargetIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" stroke="#3B82F6" strokeWidth="2"/>
                <circle cx="12" cy="12" r="6" stroke="#3B82F6" strokeWidth="2"/>
                <circle cx="12" cy="12" r="2" fill="#3B82F6"/>
            </svg>
        );

        const ShieldIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L4 6V12C4 17.55 7.16 22.74 12 24C16.84 22.74 20 17.55 20 12V6L12 2Z" stroke="#3B82F6" strokeWidth="2" fill="none"/>
                <path d="M12 12L10 10L8 12L12 16L16 12L14 10L12 12Z" fill="white" fillOpacity="0.8"/>
            </svg>
        );

        const RoadIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 18L8 6L12 14L16 2L20 10" stroke="#3B82F6" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                <circle cx="4" cy="18" r="2" fill="#3B82F6"/>
                <circle cx="20" cy="10" r="2" fill="#3B82F6"/>
            </svg>
        );

        const ArrowRightCard = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
        );

        // Header Component - Aura Design System
        const Header = ({ onHomeClick, showBreadcrumb, breadcrumbText }) => (
            <div className="absolute top-0 left-0 right-0 z-10 flex justify-between items-start" style={{ padding: 'var(--spacing-24)' }}>
                <div className="flex items-center" style={{ gap: 'var(--spacing-16)' }}>
                    <img src="images/logo.png" alt="Logo" style={{ height: '40px', width: 'auto' }} />
                    {showBreadcrumb && (
                        <div style={{ 
                            color: 'white', 
                            fontSize: 'var(--text-sm)', 
                            lineHeight: 'var(--leading-18)',
                            fontFamily: 'var(--font-inter)',
                            fontWeight: 'var(--font-weight-regular)',
                            letterSpacing: 'var(--tracking-tight)'
                        }}>
                            <span>Home</span>
                            <span style={{ color: '#3b82f6' }}> {breadcrumbText}</span>
                        </div>
                    )}
                </div>
                <button
                    onClick={onHomeClick}
                    style={{
                        width: '40px',
                        height: '40px',
                        borderRadius: 'var(--radius-sm)',
                        backgroundColor: '#2563eb',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        border: 'none',
                        cursor: 'pointer',
                        transition: 'background-color 0.2s ease'
                    }}
                    onMouseEnter={(e) => e.target.style.backgroundColor = '#1d4ed8'}
                    onMouseLeave={(e) => e.target.style.backgroundColor = '#2563eb'}
                >
                    <HomeIcon />
                </button>
            </div>
        );

        // Bottom Navigation Component - Aura Design System
        const BottomNav = ({ onPrev, onNext, currentPage, totalPages, pathTitle }) => (
            <div className="fixed bottom-0 left-0 right-0 z-10 flex items-center justify-between backdrop-blur-md" style={{ padding: 'var(--spacing-24)' }}>
                <button
                    onClick={onPrev}
                    disabled={currentPage === 1}
                    style={{
                        width: '48px',
                        height: '48px',
                        borderRadius: 'var(--radius-md)',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        border: 'none',
                        cursor: currentPage === 1 ? 'not-allowed' : 'pointer',
                        opacity: currentPage === 1 ? 0.3 : 0.8,
                        backgroundColor: currentPage === 1 ? '#374151' : '#1f2937',
                        transition: 'background-color 0.2s ease, opacity 0.2s ease',
                        fontFamily: 'var(--font-inter)'
                    }}
                    onMouseEnter={(e) => {
                        if (currentPage !== 1) e.target.style.backgroundColor = '#374151';
                    }}
                    onMouseLeave={(e) => {
                        if (currentPage !== 1) e.target.style.backgroundColor = '#1f2937';
                    }}
                >
                    <ArrowLeft />
                </button>
                <div style={{ textAlign: 'center' }}>
                    <div style={{ 
                        color: '#60a5fa', 
                        fontWeight: 'var(--font-weight-medium)',
                        fontSize: 'var(--text-sm)',
                        lineHeight: 'var(--leading-18)',
                        fontFamily: 'var(--font-inter)',
                        letterSpacing: 'var(--tracking-normal)'
                    }}>{pathTitle}</div>
                    <div style={{ 
                        color: 'white', 
                        fontSize: 'var(--text-sm)', 
                        marginTop: 'var(--spacing-4)',
                        lineHeight: 'var(--leading-18)',
                        fontFamily: 'var(--font-inter)',
                        letterSpacing: 'var(--tracking-tight)'
                    }}>{currentPage} of {totalPages}</div>
                </div>
                <button
                    onClick={onNext}
                    disabled={currentPage === totalPages}
                    style={{
                        width: '48px',
                        height: '48px',
                        borderRadius: 'var(--radius-md)',
                        display: 'flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        border: 'none',
                        cursor: currentPage === totalPages ? 'not-allowed' : 'pointer',
                        opacity: currentPage === totalPages ? 0.5 : 1,
                        backgroundColor: currentPage === totalPages ? '#374151' : '#2563eb',
                        transition: 'background-color 0.2s ease, opacity 0.2s ease',
                        fontFamily: 'var(--font-inter)'
                    }}
                    onMouseEnter={(e) => {
                        if (currentPage !== totalPages) e.target.style.backgroundColor = '#1d4ed8';
                    }}
                    onMouseLeave={(e) => {
                        if (currentPage !== totalPages) e.target.style.backgroundColor = '#2563eb';
                    }}
                >
                    <ArrowRight />
                </button>
            </div>
        );

        // Home Page
        const HomePage = ({ onPathClick, showContentImmediately = false }) => {
            const { useState, useEffect } = React;
            const [contentVisible, setContentVisible] = useState(showContentImmediately);
            const [buttonVisible, setButtonVisible] = useState(!showContentImmediately);
            const [isFadingOut, setIsFadingOut] = useState(false);
            
            const handleButtonClick = () => {
                // Hide button first
                setButtonVisible(false);
                
                // First show the gradient overlay
                const overlay = document.querySelector('.gradient-overlay');
                if (overlay) {
                    overlay.classList.add('visible');
                }
                
                // Then show content after a short delay
                setTimeout(() => {
                    setContentVisible(true);
                }, 300);
            };
            
            // Show content immediately if coming from a path
            useEffect(() => {
                if (showContentImmediately && !contentVisible) {
                    const overlay = document.querySelector('.gradient-overlay');
                    if (overlay) {
                        overlay.classList.add('visible');
                    }
                    setContentVisible(true);
                    setButtonVisible(false);
                } else if (!showContentImmediately && contentVisible) {
                    // Reset to button state when showContentImmediately becomes false
                    setIsFadingOut(true);
                    const overlay = document.querySelector('.gradient-overlay');
                    if (overlay) {
                        overlay.classList.remove('visible');
                    }
                    setTimeout(() => {
                        setContentVisible(false);
                        setIsFadingOut(false);
                        setButtonVisible(true);
                    }, 800);
                }
            }, [showContentImmediately]);
            
            // Handle fade out when resetting (triggered by parent)
            useEffect(() => {
                // This will be triggered when the app resets
                const handleReset = () => {
                    setIsFadingOut(true);
                    const overlay = document.querySelector('.gradient-overlay');
                    if (overlay) {
                        overlay.classList.remove('visible');
                    }
                    setTimeout(() => {
                        setContentVisible(false);
                        setIsFadingOut(false);
                        setButtonVisible(true);
                    }, 800);
                };
                
                // Listen for reset events (we'll trigger this from App component)
                window.addEventListener('app-reset', handleReset);
                return () => window.removeEventListener('app-reset', handleReset);
            }, []);
            
            return (
                <div className="content flex flex-col items-center justify-center min-h-screen px-6 py-12 relative">
                    <button 
                        onClick={handleButtonClick}
                        className="ghost-button"
                        style={{ 
                            position: 'absolute',
                            bottom: '33.33%',
                            transform: 'translateY(50%)',
                            opacity: buttonVisible ? 1 : 0,
                            transition: 'opacity 0.8s ease-out',
                            pointerEvents: buttonVisible ? 'auto' : 'none',
                            zIndex: buttonVisible ? 10 : 1,
                            display: 'flex',
                            alignItems: 'center',
                            gap: '0.75rem'
                        }}
                    >
                        <img src="images/logo.png" alt="Logo" className="h-6 w-auto relative z-10" />
                        <span className="relative z-10">Moonshot</span>
                    </button>
                    {contentVisible && (
                        // Content state: Show all elements with animations
                        <div style={{ 
                            opacity: isFadingOut ? 0 : 1, 
                            transform: isFadingOut ? 'translateY(-30px)' : 'translateY(0)',
                            transition: 'opacity 0.8s ease-out, transform 0.8s ease-out'
                        }}>
                            <div className={`text-center home-content ${contentVisible && !isFadingOut ? 'visible' : ''} animate-delay-100`} style={{ marginBottom: 'var(--spacing-16)' }}>
                                <div className="flex justify-center" style={{ marginBottom: 'var(--spacing-8)' }}>
                                    <img src="images/logo.png" alt="Logo" style={{ height: '48px', width: 'auto' }} />
                                </div>
                                <h1 className="text-white font-light aura-h1" style={{ marginBottom: 'var(--spacing-4)' }}>Cognite</h1>
                                <h2 className="text-white font-bold aura-h1">MoonShot</h2>
                            </div>

                            <div className={`text-center home-content ${contentVisible ? 'visible' : ''} animate-delay-200`} style={{ marginBottom: 'var(--spacing-48)' }}>
                                <div className="flex items-center justify-center" style={{ marginBottom: 'var(--spacing-8)' }}>
                                    <span className="text-blue-400 font-bold" style={{ fontSize: 'var(--text-2xl)', fontFamily: 'var(--font-inter)', color: '#60a5fa' }}>100</span>
                                    <span className="text-white mx-3" style={{ fontSize: 'var(--text-base)' }}>×</span>
                                    <span className="text-white font-bold" style={{ fontSize: 'var(--text-2xl)', fontFamily: 'var(--font-inter)' }}>35</span>
                                </div>
                                <div className="text-center">
                                    <span className="aura-body" style={{ color: '#60a5fa', fontWeight: 'var(--font-weight-medium)' }}>$100 Billion in realize</span>
                                    <span className="aura-body ml-2" style={{ color: 'white' }}>customer value by 2035</span>
                                </div>
                            </div>

                            <div className={`w-full max-w-2xl home-content ${contentVisible ? 'visible' : ''} animate-delay-300`}>
                                <div 
                                    onClick={() => onPathClick('what')}
                                    className="backdrop-blur-sm cursor-pointer transition-all duration-300 flex items-center justify-between home-content animate-delay-400"
                                    style={{ 
                                        opacity: contentVisible ? 1 : 0, 
                                        transform: contentVisible ? 'translateY(0)' : 'translateY(30px)',
                                        backgroundColor: 'rgba(30, 41, 59, 0.8)',
                                        borderRadius: 'var(--radius-2xl)',
                                        padding: 'var(--spacing-24)',

                                    <i className="fas fa-cog" style={{ color: 'white', fontSize: 'var(--text-2xl)' }}></i>
                                </div>
                                <div className="absolute top-full right-1/2 transform translate-x-1/2" style={{ marginTop: 'var(--spacing-8)', whiteSpace: 'nowrap' }}>
                                    <span className="text-white aura-label">Improve</span>
                                </div>
                            </div>
                        </div>

                        {/* Content Cards Grid */}
                        <div className="grid grid-cols-2 max-w-3xl mx-auto" style={{ gap: 'var(--spacing-24)' }}>
                            {/* Launch Card */}
                            <div className="animate-fade-in-up animate-delay-400" style={{ borderRadius: 'var(--radius-xl)', padding: 'var(--padding-16)', border: '2px solid rgba(59, 130, 246, 0.5)' }}>
                                <h3 className="text-white font-bold aura-h3" style={{ marginBottom: 'var(--spacing-8)' }}>Launch</h3>
                                <p className="aura-body-sm" style={{ color: 'rgba(255, 255, 255, 0.7)' }}>Deploy use cases to customers</p>
                            </div>

                            {/* Measure Card */}
                            <div className="animate-fade-in-up animate-delay-500" style={{ borderRadius: 'var(--radius-xl)', padding: 'var(--padding-16)', border: '2px solid rgba(16, 185, 129, 0.5)' }}>
                                <h3 className="text-white font-bold aura-h3" style={{ marginBottom: 'var(--spacing-8)' }}>Measure</h3>
                                <p className="aura-body-sm" style={{ color: 'rgba(255, 255, 255, 0.7)' }}>Track metrics & outcomes</p>
                            </div>

                            {/* Report Card */}
                            <div className="animate-fade-in-up animate-delay-600" style={{ borderRadius: 'var(--radius-xl)', padding: 'var(--padding-16)', border: '2px solid rgba(249, 115, 22, 0.5)' }}>
                                <h3 className="text-white font-bold aura-h3" style={{ marginBottom: 'var(--spacing-8)' }}>Report</h3>
                                <p className="aura-body-sm" style={{ color: 'rgba(255, 255, 255, 0.7)' }}>Document value stories</p>
                            </div>

                            {/* Improve Card */}
                            <div className="animate-fade-in-up animate-delay-700" style={{ borderRadius: 'var(--radius-xl)', padding: 'var(--padding-16)', border: '2px solid rgba(168, 85, 247, 0.5)' }}>
                                <h3 className="text-white font-bold aura-h3" style={{ marginBottom: 'var(--spacing-8)' }}>Improve</h3>
                                <p className="aura-body-sm" style={{ color: 'rgba(255, 255, 255, 0.7)' }}>Refine & optimize approach</p>
                            </div>
                        </div>
                    </div>

                    <BottomNav 
                        onPrev={onPrev} 
                        onNext={onNext} 
                        currentPage={3} 
                        totalPages={3} 
                        pathTitle="How we get there"
                    />
                </div>
            );
        };

        // Main App with Routing
        const App = () => {
            const { useRef, useEffect } = React;
            const [currentView, setCurrentView] = useState('home');
            const [currentPath, setCurrentPath] = useState(null);
            const [currentScreen, setCurrentScreen] = useState(1);
            const [hasNavigatedFromPath, setHasNavigatedFromPath] = useState(false);
            const inactivityTimerRef = useRef(null);
            
            const resetToHomeButton = () => {
                // Always reset navigation state first
                setCurrentView('home');
                setCurrentPath(null);
                setCurrentScreen(1);
                setHasNavigatedFromPath(false);
                
                // Hide gradient overlay
                const overlay = document.querySelector('.gradient-overlay');
                if (overlay) {
                    overlay.classList.remove('visible');
                }
                
                // Trigger reset event to fade out home page content if visible
                window.dispatchEvent(new Event('app-reset'));
            };
            
            const resetInactivityTimer = () => {
                // Clear existing timer
                if (inactivityTimerRef.current) {
                    clearTimeout(inactivityTimerRef.current);
                }
                
                // Set timer for 30 seconds - works on all screens
                inactivityTimerRef.current = setTimeout(() => {
                    resetToHomeButton();
                }, 30000); // 30 seconds
            };
            
            // Track user activity on all screens
            useEffect(() => {
                // Reset timer whenever view changes
                resetInactivityTimer();
                
                const activityEvents = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart', 'click'];
                
                const handleActivity = () => {
                    resetInactivityTimer();
                };
                
                // Add event listeners
                activityEvents.forEach(event => {
                    window.addEventListener(event, handleActivity);
                });
                
                // Cleanup
                return () => {
                    activityEvents.forEach(event => {
                        window.removeEventListener(event, handleActivity);
                    });
                    if (inactivityTimerRef.current) {
                        clearTimeout(inactivityTimerRef.current);
                    }
                };
            }, [currentView, currentPath, currentScreen]);

            const handlePathClick = (pathId) => {
                setCurrentPath(pathId);
                setCurrentScreen(1);
                setCurrentView('path');
                setHasNavigatedFromPath(true);
            };

            const handleHome = () => {
                setCurrentView('home');
                setCurrentPath(null);
                setCurrentScreen(1);
                // Keep hasNavigatedFromPath true so content shows
            };

            const handleNext = () => {
                if (currentPath === 'what' && currentScreen < 3) {
                    setCurrentScreen(currentScreen + 1);
                } else if (currentPath === 'why' && currentScreen < 3) {
                    setCurrentScreen(currentScreen + 1);
                } else if (currentPath === 'how' && currentScreen < 3) {
                    setCurrentScreen(currentScreen + 1);
                }
            };

            const handlePrev = () => {
                if (currentScreen > 1) {
                    setCurrentScreen(currentScreen - 1);
                } else {
                    handleHome();
                }
            };

            const renderView = () => {
                if (currentView === 'home') {
                    // Show content immediately if we're navigating back from a path
                    return <HomePage onPathClick={handlePathClick} showContentImmediately={hasNavigatedFromPath} />;
                }

                if (currentPath === 'what') {
                    if (currentScreen === 1) {
                        return <WhatScreen1 onNext={handleNext} onHome={handleHome} />;
                    } else if (currentScreen === 2) {
                        return <WhatScreen2 onPrev={handlePrev} onNext={handleNext} onHome={handleHome} />;
                    } else if (currentScreen === 3) {
                        return <WhatScreen3 onPrev={handlePrev} onHome={handleHome} />;
                    }
                }

                if (currentPath === 'why') {
                    if (currentScreen === 1) {
                        return <WhyScreen1 onNext={handleNext} onHome={handleHome} />;
                    } else if (currentScreen === 2) {
                        return <WhyScreen2 onPrev={handlePrev} onNext={handleNext} onHome={handleHome} />;
                    } else if (currentScreen === 3) {
                        return <WhyScreen3 onPrev={handlePrev} onHome={handleHome} />;
                    }
                }

                if (currentPath === 'how') {
                    if (currentScreen === 1) {
                        return <HowScreen1 onNext={handleNext} onHome={handleHome} />;
                    } else if (currentScreen === 2) {
                        return <HowScreen2 onPrev={handlePrev} onNext={handleNext} onHome={handleHome} />;
                    } else if (currentScreen === 3) {
                        return <HowScreen3 onPrev={handlePrev} onNext={handleNext} onHome={handleHome} />;
                    }
                }

                return <HomePage onPathClick={handlePathClick} showContentImmediately={true} />;
            };

            return renderView();
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>

    <script>
        // Ensure video plays
        const video = document.getElementById('bg-video');
        if (video) {
            video.addEventListener('loadeddata', () => {
                video.play().catch(err => {
                    console.log('Video autoplay prevented:', err);
                });
            });
            video.addEventListener('canplay', () => {
                video.play().catch(err => {
                    console.log('Video play on canplay failed:', err);
                });
            });
            video.play().catch(err => {
                console.log('Initial play attempt:', err);
            });
        }

        // Fullscreen functionality
        function requestFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            } else if (elem.mozRequestFullScreen) {
                elem.mozRequestFullScreen();
            }
        }

        window.addEventListener('load', () => {
            setTimeout(() => {
                requestFullscreen();
            }, 500);
        });

        document.addEventListener('click', () => {
            if (!document.fullscreenElement && 
                !document.webkitFullscreenElement && 
                !document.msFullscreenElement && 
                !document.mozFullScreenElement) {
                requestFullscreen();
            }
        }, { once: true });
    </script>
</body>
</html>
