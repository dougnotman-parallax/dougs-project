<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter Logic UI for Agentic Systems</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // --- Icon Components (replaces lucide-react for single-file compatibility) ---
        const Icon = ({ size = 18, children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                {children}
            </svg>
        );
        const Plus = ({ size }) => <Icon size={size}><path d="M5 12h14"/><path d="M12 5v14"/></Icon>;
        const Trash2 = ({ size }) => <Icon size={size}><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></Icon>;
        const Layers = ({ size }) => <Icon size={size}><polygon points="12 2 2 7 12 12 22 7 12 2"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></Icon>;
        const X = ({ size }) => <Icon size={size}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></Icon>;
        const Search = ({ size }) => <Icon size={size}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Icon>;
        const ChevronDown = ({ size }) => <Icon size={size}><polyline points="6 9 12 15 18 9"/></Icon>;

        // --- Configuration Data ---
        const FIELDS_CONFIG = [
          { id: 'user_name', label: 'User Name', type: 'text' },
          { id: 'user_email', label: 'User Email', type: 'text' },
          { id: 'age', label: 'Age', type: 'number' },
          { id: 'is_verified', label: 'Is Verified', type: 'boolean' },
          { id: 'last_login', label: 'Last Login', type: 'date' },
          {
            id: 'address',
            label: 'Address',
            type: 'object',
            fields: [
              { id: 'city', label: 'City', type: 'text' },
              { id: 'country', label: 'Country', type: 'select', options: ['USA', 'Canada', 'UK', 'Germany', 'France'] },
            ]
          },
          {
            id: 'orders',
            label: 'Orders',
            type: 'list',
            fields: [
              { id: 'product_name', label: 'Product Name', type: 'text' },
              { id: 'price', label: 'Price', type: 'number' },
              { id: 'quantity', label: 'Quantity', type: 'number' },
              { id: 'order_date', label: 'Order Date', type: 'date' },
            ]
          },
        ];

        const OPERATORS_CONFIG = {
          text: [ { id: 'contains', label: 'contains' }, { id: 'not_contains', label: 'does not contain' }, { id: 'equals', label: 'is' }, { id: 'not_equals', label: 'is not' }, { id: 'starts_with', label: 'starts with' }, { id: 'ends_with', label: 'ends with' }, ],
          number: [ { id: 'eq', label: '=' }, { id: 'neq', label: '!=' }, { id: 'gt', label: '>' }, { id: 'gte', label: '>=' }, { id: 'lt', label: '<' }, { id: 'lte', label: '<=' }, ],
          select: [ { id: 'is', label: 'is' }, { id: 'is_not', label: 'is not' }, ],
          boolean: [ { id: 'is', label: 'is' }, ],
          date: [ { id: 'is', label: 'is' }, { id: 'is_before', label: 'is before' }, { id: 'is_after', label: 'is after' }, ],
        };

        const QUANTIFIERS = [ { id: 'ANY', label: 'at least one' }, { id: 'ALL', label: 'all' }, { id: 'NONE', label: 'none' }, ];

        const FieldsContext = React.createContext(FIELDS_CONFIG);

        // --- Helper Functions ---
        const generateId = () => `id_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;

        const flattenFields = (fields, prefix = '', prefixLabel = '') => {
          let flat = [];
          fields.forEach(field => {
            const newId = prefix ? `${prefix}.${field.id}` : field.id;
            const newLabel = prefixLabel ? `${prefixLabel} > ${field.label}` : field.label;
            const isParent = (field.type === 'object' || field.type === 'list');
            flat.push({ ...field, id: newId, label: newLabel, isParent });
            if (isParent && field.fields) {
              flat = flat.concat(flattenFields(field.fields, newId, newLabel));
            }
          });
          return flat;
        };

        const getFieldConfig = (path, fields) => {
          const parts = path.split('.');
          let currentConfig = { fields };
          for (const part of parts) {
            if (!currentConfig || !currentConfig.fields) return null;
            currentConfig = currentConfig.fields.find(f => f.id === part);
          }
          return currentConfig;
        };

        const createRuleForField = (fieldPath, fieldsConfig, combinator = 'AND') => {
          const fieldConfig = getFieldConfig(fieldPath, fieldsConfig);
          if (!fieldConfig) return null;

          if (fieldConfig.type === 'list') {
            return {
              id: generateId(),
              field: fieldPath,
              type: 'list_condition',
              quantifier: 'ANY',
              combinator: combinator,
              conditions: createNewGroup(fieldConfig.fields),
            };
          }

          return {
            id: generateId(),
            field: fieldPath,
            operator: OPERATORS_CONFIG[fieldConfig.type][0].id,
            value: fieldConfig.type === 'boolean' ? 'true' : '',
            combinator: combinator,
            type: 'rule',
          };
        };

        const createNewRule = (fieldsConfig) => {
          const firstField = flattenFields(fieldsConfig).filter(f => !f.isParent)[0];
          return createRuleForField(firstField.id, fieldsConfig, 'AND');
        };

        const createNewGroup = (fieldsConfig) => ({
          id: generateId(),
          combinator: 'AND',
          rules: [createNewRule(fieldsConfig)],
          type: 'group',
        });

        // --- UI Components ---
        const { useState, useMemo, useContext, useRef, useEffect } = React;

        const ValueInput = ({ rule, onUpdate, fieldConfig }) => {
          const commonProps = {
            value: rule.value,
            onChange: (e) => onUpdate({ ...rule, value: e.target.value }),
            className: "w-full flex-grow bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2",
          };

          switch (fieldConfig.type) {
            case 'number': return <input type="number" {...commonProps} placeholder="e.g., 25" />;
            case 'date': return <input type="date" {...commonProps} />;
            case 'select': return ( <select {...commonProps}> {fieldConfig.options.map(o => <option key={o} value={o}>{o}</option>)} </select> );
            case 'boolean': return ( <select {...commonProps}> <option value="true">True</option> <option value="false">False</option> </select> );
            default: return <input type="text" {...commonProps} placeholder="Enter value..." />;
          }
        };

        const SearchableFieldSelector = ({ value, onChange, fields }) => {
          const [searchTerm, setSearchTerm] = useState('');
          const [isOpen, setIsOpen] = useState(false);
          const wrapperRef = useRef(null);
          const inputRef = useRef(null);

          // Single value selection (radio button behavior)
          const selectedFieldId = useMemo(() => {
            if (Array.isArray(value)) return value[0] || null;
            return value || null;
          }, [value]);

          const flatFields = useMemo(() => flattenFields(fields), [fields]);
          
          // Build hierarchy structure for parent-child relationships
          const fieldHierarchy = useMemo(() => {
            const hierarchy = {};
            flatFields.forEach(field => {
              if (field.isParent) {
                const children = flatFields.filter(f => 
                  f.id.startsWith(field.id + '.') && !f.isParent
                );
                hierarchy[field.id] = {
                  field,
                  children: children.map(c => c.id)
                };
              }
            });
            return hierarchy;
          }, [flatFields]);

          // Get all children of a parent field
          const getChildrenIds = (parentId) => {
            if (fieldHierarchy[parentId]) {
              return fieldHierarchy[parentId].children;
            }
            return [];
          };

          // Check if a field is selected (for radio buttons)
          const isFieldSelected = (fieldId) => {
            return selectedFieldId === fieldId;
          };

          // Check if any child of a parent is selected
          const isParentSelected = (parentId) => {
            const childrenIds = getChildrenIds(parentId);
            return childrenIds.some(childId => isFieldSelected(childId));
          };

          const filteredFields = useMemo(() => {
            if (!searchTerm) return flatFields;
            const term = searchTerm.toLowerCase();
            const matchingFieldIds = new Set();
            
            // First pass: find all matching fields
            flatFields.forEach(field => {
              if (field.label.toLowerCase().includes(term)) {
                matchingFieldIds.add(field.id);
                // If it's a child, also include its parent
                const parts = field.id.split('.');
                if (parts.length > 1) {
                  // Add parent path
                  for (let i = 1; i < parts.length; i++) {
                    const parentPath = parts.slice(0, i).join('.');
                    const parentField = flatFields.find(f => f.id === parentPath && f.isParent);
                    if (parentField) {
                      matchingFieldIds.add(parentPath);
                    }
                  }
                }
              }
            });
            
            // Second pass: include all children of matching parents
            flatFields.forEach(field => {
              if (field.isParent && matchingFieldIds.has(field.id) && fieldHierarchy[field.id]) {
                fieldHierarchy[field.id].children.forEach(childId => {
                  matchingFieldIds.add(childId);
                });
              }
            });
            
            return flatFields.filter(field => matchingFieldIds.has(field.id));
          }, [flatFields, searchTerm, fieldHierarchy]);

          useEffect(() => {
            function handleClickOutside(event) {
              if (wrapperRef.current && !wrapperRef.current.contains(event.target)) {
                setIsOpen(false);
                setSearchTerm('');
              }
            }
            document.addEventListener("mousedown", handleClickOutside);
            return () => document.removeEventListener("mousedown", handleClickOutside);
          }, [wrapperRef]);

          const handleToggle = (field) => {
            let parentSelected = null;
            let selectedField = field.id;

            if (field.isParent) {
              // When parent is selected, mark it for creating multiple rules
              parentSelected = field.id;
              // For visual consistency, we'll show the parent as selected
              // but the parentSelected flag will trigger rule creation
            }

            // Call onChange with object containing selected field and parent selection info
            onChange({
              selectedFields: [selectedField],
              parentSelected: parentSelected
            });
          };

          // Get display text for selected field
          const getDisplayText = () => {
            if (!selectedFieldId) return 'Select a field...';
            const field = flatFields.find(f => f.id === selectedFieldId);
            if (!field) return 'Select a field...';
            // Show the full "parent > child" relationship in the display
            return field.label;
          };

          // Calculate indentation level based on field path depth
          const getIndentLevel = (fieldId) => {
            return (fieldId.match(/\./g) || []).length;
          };

          // Get parent field ID for a given field
          const getParentId = (fieldId) => {
            const parts = fieldId.split('.');
            if (parts.length <= 1) return null;
            return parts.slice(0, -1).join('.');
          };

          // Check if field has siblings after it in the filtered list
          const hasSiblingAfter = (currentIndex, fieldId) => {
            const parentId = getParentId(fieldId);
            if (!parentId) return false;
            
            for (let i = currentIndex + 1; i < filteredFields.length; i++) {
              const nextField = filteredFields[i];
              const nextParentId = getParentId(nextField.id);
              if (nextParentId === parentId) return true;
              // If we hit a field at same or lower level, stop
              if (getIndentLevel(nextField.id) <= getIndentLevel(fieldId)) break;
            }
            return false;
          };

          // Check if field is the last child of its parent in the filtered list
          const isLastChild = (currentIndex, fieldId) => {
            const parentId = getParentId(fieldId);
            if (!parentId) return false;
            
            for (let i = currentIndex + 1; i < filteredFields.length; i++) {
              const nextField = filteredFields[i];
              const nextParentId = getParentId(nextField.id);
              if (nextParentId === parentId) return false;
              // If we hit a field at same or lower level, this is the last child
              if (getIndentLevel(nextField.id) <= getIndentLevel(fieldId)) return true;
            }
            return true;
          };

          return (
            <div ref={wrapperRef} className="relative w-full">
              <div
                className="flex-grow w-full bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2 flex items-center justify-between cursor-pointer"
                onClick={() => setIsOpen(true)}
              >
                <span>{getDisplayText()}</span>
                <ChevronDown size={16} className="text-gray-500" />
              </div>

              {isOpen && (
                <div className="absolute z-10 top-full mt-1 w-full bg-white border border-gray-300 rounded-lg shadow-lg max-h-60 overflow-y-auto">
                  <div className="p-2 sticky top-0 bg-white border-b z-20 shadow-sm">
                    <div className="relative">
                       <Search size={16} className="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400" />
                       <input
                          ref={inputRef}
                          type="text"
                          placeholder="Search fields..."
                          className="w-full bg-gray-50 border border-gray-300 rounded-md p-2 pl-8 text-sm focus:ring-blue-500 focus:border-blue-500"
                          value={searchTerm}
                          onChange={(e) => setSearchTerm(e.target.value)}
                          autoFocus
                        />
                    </div>
                  </div>
                  <ul className="py-1 relative">
                    {filteredFields.map((field, index) => {
                      const indentLevel = getIndentLevel(field.id);
                      const isParent = field.isParent;
                      const isSelected = isFieldSelected(field.id);
                      const parentId = getParentId(field.id);
                      
                      // Build line data for each hierarchy level
                      const buildLines = () => {
                        const lines = [];
                        for (let level = 1; level <= indentLevel; level++) {
                          const levelParentId = field.id.split('.').slice(0, level).join('.');
                          
                          // Check if there are siblings at this level after current item
                          let hasSiblingAfter = false;
                          for (let i = index + 1; i < filteredFields.length; i++) {
                            const nextField = filteredFields[i];
                            const nextLevelParentId = nextField.id.split('.').slice(0, level).join('.');
                            if (nextLevelParentId === levelParentId) {
                              hasSiblingAfter = true;
                              break;
                            }
                            if (getIndentLevel(nextField.id) < level) break;
                          }
                          
                          lines.push({
                            level,
                            left: 12 + (level - 1) * 20,
                            hasSiblingAfter,
                            isCurrentLevel: level === indentLevel
                          });
                        }
                        return lines;
                      };
                      
                      const lines = buildLines();
                      
                      return (
                        <li
                          key={field.id}
                          onClick={(e) => {
                            e.stopPropagation();
                            handleToggle(field);
                          }}
                          className={`p-2 text-sm cursor-pointer hover:bg-blue-50 flex items-center relative ${
                            isSelected ? 'bg-blue-100 font-medium' : ''
                          }`}
                          style={{ paddingLeft: `${12 + indentLevel * 20}px` }}
                        >
                          {/* Tree structure lines */}
                          {lines.map((line) => (
                            <React.Fragment key={line.level}>
                              {/* Vertical line from top down to horizontal connector position (for all levels) */}
                              <div
                                className="absolute border-l border-gray-300"
                                style={{
                                  left: `${line.left}px`,
                                  top: 0,
                                  bottom: '50%',
                                  width: '1px'
                                }}
                              />
                              {/* Horizontal connector and continuation (only for current level) */}
                              {line.isCurrentLevel && (
                                <>
                                  {/* Horizontal connector line */}
                                  <div
                                    className="absolute border-t border-gray-300"
                                    style={{
                                      left: `${line.left}px`,
                                      top: '50%',
                                      width: '12px',
                                      height: '1px'
                                    }}
                                  />
                                  {/* Vertical line continuing below if there are siblings */}
                                  {line.hasSiblingAfter && (
                                    <div
                                      className="absolute border-l border-gray-300"
                                      style={{
                                        left: `${line.left}px`,
                                        top: '50%',
                                        bottom: 0,
                                        width: '1px'
                                      }}
                                    />
                                  )}
                                </>
                              )}
                            </React.Fragment>
                          ))}
                          
                          <span className={`flex-1 relative z-10 ${isParent ? 'font-semibold text-gray-700' : 'text-gray-900'}`}>
                            {isParent ? field.label : field.label.split(' > ').pop()}
                          </span>
                        </li>
                      );
                    })}
                     {filteredFields.length === 0 && <li className="p-2 text-sm text-gray-500">No fields found.</li>}
                  </ul>
                </div>
              )}
            </div>
          );
        };

        const StandardRule = ({ rule, onUpdate, onDelete, onAddRules }) => {
          const fieldsConfig = useContext(FieldsContext);
          const selectedField = getFieldConfig(rule.field, fieldsConfig);

          const handleFieldChange = (changeData) => {
            // Handle new format: { selectedFields: [], parentSelected: null }
            // or backward compatibility with old format (string or array)
            let selectedFields = [];
            let parentSelected = null;

            if (typeof changeData === 'object' && changeData.selectedFields) {
              // New format
              selectedFields = changeData.selectedFields;
              parentSelected = changeData.parentSelected;
            } else if (Array.isArray(changeData)) {
              // Old array format
              selectedFields = changeData;
            } else if (typeof changeData === 'string') {
              // Old string format
              selectedFields = [changeData];
            }

            // If a parent was selected, create rules for all children
            if (parentSelected && onAddRules) {
              const flatFields = flattenFields(fieldsConfig);
              const parentField = flatFields.find(f => f.id === parentSelected && f.isParent);
              
              if (parentField) {
                // Get all child fields (non-parent fields that start with parent path)
                const childFields = flatFields.filter(f => 
                  !f.isParent && 
                  f.id.startsWith(parentSelected + '.')
                );

                // Create a rule for each child field
                const newRules = childFields
                  .map(childField => createRuleForField(childField.id, fieldsConfig))
                  .filter(rule => rule !== null);

                if (newRules.length > 0) {
                  // Add the new rules (replaces the current rule)
                  onAddRules(newRules);
                  return;
                }
              }
            }

            // Normal field selection - use the last selected field
            const newFieldPath = selectedFields.length > 0 
              ? selectedFields[selectedFields.length - 1]
              : rule.field;
            
            if (!newFieldPath) return;
            
            const newField = getFieldConfig(newFieldPath, fieldsConfig);
            if (!newField) return;

            if (newField.type === 'list') {
              onUpdate({
                id: rule.id,
                field: newFieldPath,
                type: 'list_condition',
                quantifier: 'ANY',
                conditions: createNewGroup(newField.fields),
              });
            } else {
              onUpdate({
                ...rule,
                field: newFieldPath,
                operator: OPERATORS_CONFIG[newField.type][0].id,
                value: newField.type === 'boolean' ? 'true' : '',
              });
            }
          };

          if (!selectedField) return null;

          return (
            <div className="flex flex-col md:flex-row items-center gap-2 w-full py-2">
              <div className="w-full md:w-auto">
                <select 
                  value={rule.combinator || 'AND'} 
                  onChange={(e) => onUpdate({ ...rule, combinator: e.target.value })} 
                  className="w-full md:w-20 bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2"
                >
                  <option value="AND">AND</option>
                  <option value="OR">OR</option>
                </select>
              </div>
              <div className="w-full md:w-1/3">
                  <SearchableFieldSelector value={rule.field ? [rule.field] : []} onChange={handleFieldChange} fields={fieldsConfig} />
              </div>
              <div className="w-full md:w-auto">
                <select value={rule.operator} onChange={(e) => onUpdate({ ...rule, operator: e.target.value })} className="w-full bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2">
                    {OPERATORS_CONFIG[selectedField.type].map(op => <option key={op.id} value={op.id}>{op.label}</option>)}
                </select>
              </div>
              <div className="w-full flex-grow">
                <ValueInput rule={rule} onUpdate={onUpdate} fieldConfig={selectedField} />
              </div>
              <button onClick={onDelete} className="p-2 text-gray-500 hover:text-red-600 rounded transition-colors"><Trash2 size={18} /></button>
            </div>
          );
        };

        const ListConditionRule = ({ rule, onUpdate, onDelete }) => {
            const fieldsConfig = useContext(FieldsContext);
            const fieldConfig = getFieldConfig(rule.field, fieldsConfig);

            return (
                <div className="w-full py-3 space-y-2">
                    <div className="flex flex-col md:flex-row items-center gap-2">
                        <div className="w-full md:w-auto">
                          <select 
                            value={rule.combinator || 'AND'} 
                            onChange={(e) => onUpdate({ ...rule, combinator: e.target.value })} 
                            className="w-full md:w-20 bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2"
                          >
                            <option value="AND">AND</option>
                            <option value="OR">OR</option>
                          </select>
                        </div>
                        <span className="font-semibold text-gray-800">{fieldConfig.label}</span>
                        <span className="text-sm text-gray-700">where</span>
                        <select value={rule.quantifier} onChange={(e) => onUpdate({ ...rule, quantifier: e.target.value })} className="bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-blue-500 focus:border-blue-500 p-2">
                            {QUANTIFIERS.map(q => <option key={q.id} value={q.id}>{q.label}</option>)}
                        </select>
                        <span className="text-sm text-gray-700">is true:</span>
                        <button onClick={onDelete} className="p-2 text-gray-500 hover:text-red-600 rounded transition-colors md:ml-auto"><Trash2 size={18} /></button>
                    </div>
                    <FieldsContext.Provider value={fieldConfig.fields}>
                        <FilterGroup group={rule.conditions} onUpdate={(newConditions) => onUpdate({ ...rule, conditions: newConditions })} />
                    </FieldsContext.Provider>
                </div>
            );
        };

        const Rule = ({ rule, onUpdate, onDelete, onAddRules }) => {
          if (rule.type === 'list_condition') {
            return <ListConditionRule rule={rule} onUpdate={onUpdate} onDelete={onDelete} />;
          }
          return <StandardRule rule={rule} onUpdate={onUpdate} onDelete={onDelete} onAddRules={onAddRules} />;
        };

        // Component for selecting field before creating rule
        const FieldSelectorStep = ({ onFieldSelected, onCancel, fields }) => {
          const [selectedField, setSelectedField] = useState(null);
          const [parentSelected, setParentSelected] = useState(null);

          const handleFieldSelect = (changeData) => {
            let selectedFields = [];
            let parentSel = null;

            if (typeof changeData === 'object' && changeData.selectedFields) {
              selectedFields = changeData.selectedFields;
              parentSel = changeData.parentSelected;
            } else if (Array.isArray(changeData)) {
              selectedFields = changeData;
            } else if (typeof changeData === 'string') {
              selectedFields = [changeData];
            }

            if (selectedFields.length > 0) {
              setSelectedField(selectedFields[0]);
              setParentSelected(parentSel);
            }
          };

          const handleConfirm = () => {
            if (selectedField) {
              onFieldSelected(selectedField, parentSelected);
            }
          };

          return (
            <div className="p-4 rounded-lg bg-white">
              <div className="mb-3">
                <h3 className="text-sm font-medium text-gray-700 mb-2">Select a field</h3>
                <SearchableFieldSelector 
                  value={selectedField ? [selectedField] : []} 
                  onChange={handleFieldSelect} 
                  fields={fields} 
                />
              </div>
              <div className="flex gap-2">
                <button 
                  onClick={handleConfirm}
                  disabled={!selectedField}
                  className="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed"
                >
                  Continue
                </button>
                <button 
                  onClick={onCancel}
                  className="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors"
                >
                  Cancel
                </button>
              </div>
            </div>
          );
        };

        // Helper to get parent field ID from a field path
        const getParentFieldId = (fieldPath) => {
          const parts = fieldPath.split('.');
          if (parts.length <= 1) return null;
          return parts.slice(0, -1).join('.');
        };

        // Helper to group rules by parent
        const groupRulesByParent = (rules, fieldsConfig) => {
          const flatFields = flattenFields(fieldsConfig);
          const groups = [];
          const ungrouped = [];

          rules.forEach(rule => {
            if (rule.type === 'group') {
              groups.push({ type: 'group', item: rule });
            } else {
              const parentId = getParentFieldId(rule.field);
              if (parentId) {
                const parentField = flatFields.find(f => f.id === parentId && f.isParent);
                if (parentField) {
                  let group = groups.find(g => g.type === 'parent' && g.parentId === parentId);
                  if (!group) {
                    group = { type: 'parent', parentId, parentLabel: parentField.label, rules: [] };
                    groups.push(group);
                  }
                  group.rules.push(rule);
                } else {
                  ungrouped.push({ type: 'rule', item: rule });
                }
              } else {
                ungrouped.push({ type: 'rule', item: rule });
              }
            }
          });

          return [...groups, ...ungrouped];
        };

        const FilterGroup = ({ group, onUpdate, onDelete, isRoot = false }) => {
          const fieldsConfig = useContext(FieldsContext);
          const [addingRule, setAddingRule] = useState(false);

          const updateChild = (childId, newChildData) => onUpdate({ ...group, rules: group.rules.map(r => (r.id === childId ? newChildData : r)) });
          const deleteChild = (childId) => onUpdate({ ...group, rules: group.rules.filter(r => r.id !== childId) });
          
          const handleFieldSelected = (fieldPath, parentSelected) => {
            setAddingRule(false);
            
            // Get combinator from last rule, or default to AND
            const lastRule = group.rules[group.rules.length - 1];
            const combinator = lastRule?.combinator || 'AND';
            
            if (parentSelected) {
              // Create rules for all children
              const flatFields = flattenFields(fieldsConfig);
              const parentField = flatFields.find(f => f.id === parentSelected && f.isParent);
              
              if (parentField) {
                const childFields = flatFields.filter(f => 
                  !f.isParent && 
                  f.id.startsWith(parentSelected + '.')
                );

                const newRules = childFields
                  .map((childField, index) => createRuleForField(childField.id, fieldsConfig, index === 0 ? combinator : 'AND'))
                  .filter(rule => rule !== null);

                if (newRules.length > 0) {
                  onUpdate({ ...group, rules: [...group.rules, ...newRules] });
                }
              }
            } else {
              // Create single rule
              const newRule = createRuleForField(fieldPath, fieldsConfig, combinator);
              if (newRule) {
                onUpdate({ ...group, rules: [...group.rules, newRule] });
              }
            }
          };

          const addRule = () => setAddingRule(true);
          const addGroup = () => onUpdate({ ...group, rules: [...group.rules, createNewGroup(fieldsConfig)] });
          
          // Add child rule to a parent group
          const addChildToParent = (parentId) => {
            const flatFields = flattenFields(fieldsConfig);
            const childFields = flatFields.filter(f => 
              !f.isParent && 
              f.id.startsWith(parentId + '.')
            );
            
            // Get existing child rules for this parent
            const existingChildIds = group.rules
              .filter(r => r.type === 'rule' && r.field.startsWith(parentId + '.'))
              .map(r => r.field);
            
            // Find a child that doesn't have a rule yet
            const availableChild = childFields.find(f => !existingChildIds.includes(f.id));
            
            if (availableChild) {
              // Get combinator from last child rule of this parent, or default to AND
              const parentRules = group.rules.filter(r => r.type === 'rule' && r.field.startsWith(parentId + '.'));
              const lastParentRule = parentRules[parentRules.length - 1];
              const combinator = lastParentRule?.combinator || 'AND';
              
              const newRule = createRuleForField(availableChild.id, fieldsConfig, combinator);
              if (newRule) {
                // Insert after the last child of this parent
                const lastParentRuleIndex = group.rules.findIndex(r => r.id === lastParentRule?.id);
                const insertIndex = lastParentRuleIndex !== -1 ? lastParentRuleIndex + 1 : group.rules.length;
                
                const newRulesArray = [
                  ...group.rules.slice(0, insertIndex),
                  newRule,
                  ...group.rules.slice(insertIndex)
                ];
                onUpdate({ ...group, rules: newRulesArray });
              }
            }
          };

          const groupedRules = groupRulesByParent(group.rules, fieldsConfig);

          return (
            <div className={`w-full ${isRoot ? '' : 'ml-4 mt-2'}`}>
              {!isRoot && group.rules.length > 0 && (
                <div className="flex items-center justify-end mb-4">
                  <button onClick={onDelete} className="p-2 text-gray-500 hover:text-red-600 rounded transition-colors"><X size={18} /></button>
                </div>
              )}
              
              {addingRule && (
                <FieldSelectorStep 
                  onFieldSelected={handleFieldSelected}
                  onCancel={() => setAddingRule(false)}
                  fields={fieldsConfig}
                />
              )}

              <div className="space-y-4">
                {groupedRules.map((groupItem, groupIndex) => {
                  if (groupItem.type === 'group') {
                    return (
                      <FilterGroup 
                        key={groupItem.item.id}
                        group={groupItem.item} 
                        onUpdate={(newGroup) => updateChild(groupItem.item.id, newGroup)} 
                        onDelete={() => deleteChild(groupItem.item.id)} 
                      />
                    );
                  } else if (groupItem.type === 'parent') {
                    const flatFields = flattenFields(fieldsConfig);
                    const allChildren = flatFields.filter(f => 
                      !f.isParent && 
                      f.id.startsWith(groupItem.parentId + '.')
                    );
                    const hasMoreChildren = allChildren.length > groupItem.rules.length;

                    return (
                      <div key={groupItem.parentId} className="space-y-3">
                        <div className="flex items-center justify-between">
                          <h4 className="text-sm font-semibold text-gray-800">{groupItem.parentLabel}</h4>
                          {hasMoreChildren && (
                            <button 
                              onClick={() => addChildToParent(groupItem.parentId)}
                              className="flex items-center gap-1 px-2 py-1 text-xs font-medium text-blue-600 hover:text-blue-700 hover:bg-blue-50 rounded transition-colors"
                            >
                              <Plus size={14} /> Add Child
                            </button>
                          )}
                        </div>
                        <div className="ml-4 space-y-3">
                          {groupItem.rules.map((rule, ruleIndex) => (
                            <React.Fragment key={rule.id}>
                              <Rule 
                                rule={rule} 
                                onUpdate={(newRule) => updateChild(rule.id, newRule)} 
                                onDelete={() => deleteChild(rule.id)} 
                                onAddRules={null}
                              />
                              {ruleIndex < groupItem.rules.length - 1 && (
                                <div className="flex items-center justify-center my-2">
                                  <span className="text-xs text-gray-500 px-2">
                                    {rule.combinator || 'AND'}
                                  </span>
                                </div>
                              )}
                            </React.Fragment>
                          ))}
                        </div>
                        {groupIndex < groupedRules.length - 1 && (
                          <div className="flex items-center justify-center my-2">
                            <span className="text-xs text-gray-500 px-2">
                              {groupItem.rules[groupItem.rules.length - 1]?.combinator || 'AND'}
                            </span>
                          </div>
                        )}
                      </div>
                    );
                  } else {
                    return (
                      <React.Fragment key={groupItem.item.id}>
                        <Rule 
                          rule={groupItem.item} 
                          onUpdate={(newRule) => updateChild(groupItem.item.id, newRule)} 
                          onDelete={() => deleteChild(groupItem.item.id)} 
                          onAddRules={null}
                        />
                        {groupIndex < groupedRules.length - 1 && (
                          <div className="flex items-center justify-center my-2">
                            <span className="text-xs text-gray-500 px-2">
                              {groupItem.item.combinator || 'AND'}
                            </span>
                          </div>
                        )}
                      </React.Fragment>
                    );
                  }
                })}
              </div>

              <div className="mt-4">
                {!addingRule && (
                  <button 
                    onClick={addRule} 
                    className="flex items-center gap-2 px-4 py-2 text-sm font-medium text-blue-600 hover:text-blue-700 hover:bg-blue-50 rounded-lg transition-colors"
                  >
                    <Plus size={16} /> Add Rule
                  </button>
                )}
              </div>
            </div>
          );
        };

        function App() {
          const [filters, setFilters] = useState(() => ({ id: generateId(), combinator: 'AND', rules: [], type: 'group' }));
          const [mode, setMode] = useState('basic'); // 'basic' or 'advanced'
          const [jsonInput, setJsonInput] = useState(JSON.stringify(filters, null, 2));
          const [jsonError, setJsonError] = useState(null);

          useEffect(() => {
            if (mode === 'basic') {
              setJsonInput(JSON.stringify(filters, null, 2));
              setJsonError(null);
            }
          }, [filters, mode]);

          const handleModeChange = (newMode) => {
            if (newMode === 'basic' && mode === 'advanced') {
              try {
                const parsedJson = JSON.parse(jsonInput);
                setFilters(parsedJson);
                setJsonError(null);
                setMode('basic');
              } catch (error) {
                setJsonError('Invalid JSON format. Please correct it before switching to Basic mode.');
              }
            } else {
              setMode(newMode);
            }
          };

          const handleReset = () => {
              const newFilters = { id: generateId(), combinator: 'AND', rules: [], type: 'group' };
              setFilters(newFilters);
              setJsonInput(JSON.stringify(newFilters, null, 2));
              setJsonError(null);
              setMode('basic');
          };

          return (
            <div className="min-h-screen bg-white text-gray-800 p-4 md:p-8">
              <div className="max-w-4xl mx-auto">
                <header className="mb-6">
                  <h1 className="text-3xl font-bold text-gray-900">Agentic Filter Builder</h1>
                  <p className="text-gray-600 mt-1">Construct complex queries for nested data models.</p>
                </header>
                <div className="grid grid-cols-1 gap-8">
                  <div className="p-6">
                    <div className="flex items-center justify-between mb-4">
                        <h2 className="text-xl font-semibold">Filter Conditions</h2>
                        <div className="flex items-center rounded-full">
                          <button onClick={() => handleModeChange('basic')} className={`px-4 py-1 text-sm font-medium rounded-full transition-colors ${mode === 'basic' ? 'bg-blue-600 text-white' : 'text-gray-600 hover:bg-gray-100'}`}>Basic</button>
                          <button onClick={() => handleModeChange('advanced')} className={`px-4 py-1 text-sm font-medium rounded-full transition-colors ${mode === 'advanced' ? 'bg-blue-600 text-white' : 'text-gray-600 hover:bg-gray-100'}`}>Advanced</button>
                        </div>
                    </div>
                    
                    {mode === 'basic' ? (
                        <FieldsContext.Provider value={FIELDS_CONFIG}>
                            <FilterGroup group={filters} onUpdate={setFilters} isRoot={true} />
                        </FieldsContext.Provider>
                    ) : (
                        <div>
                            <textarea
                                className={`w-full h-96 p-3 font-mono text-sm bg-gray-50 rounded-lg border ${jsonError ? 'border-red-500' : 'border-gray-300'} focus:ring-blue-500 focus:border-blue-500`}
                                value={jsonInput}
                                onChange={(e) => setJsonInput(e.target.value)}
                            ></textarea>
                            {jsonError && <p className="mt-2 text-sm text-red-600">{jsonError}</p>}
                        </div>
                    )}

                    <div className="mt-6 flex justify-end"><button onClick={handleReset} className="px-4 py-2 text-sm font-medium text-gray-700 bg-gray-200 hover:bg-gray-300 rounded-lg transition-colors">Reset Filters</button></div>
                  </div>
                </div>
              </div>
            </div>
          );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);

    </script>
</body>
</html>
