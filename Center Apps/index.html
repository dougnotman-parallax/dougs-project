        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
        }
        
        .font-heading {
            font-family: 'Space Grotesk', sans-serif;
        }
        .font-inter {
            font-family: 'Inter', sans-serif;
        }
        
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }
        
        .background-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, rgba(15, 23, 42, 0.95) 0%, rgba(2, 6, 23, 0.98) 100%);
            z-index: 0;
            opacity: 0;
            transition: opacity 1s ease-out;
        }
        
        .gradient-overlay.visible {
            opacity: 1;
        }
        
        .ghost-button {
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 1rem 3rem;
            font-size: 1.5rem;
            font-weight: 600;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }
        
        .ghost-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 60%;
            height: 2px;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.6),
                rgba(255, 255, 255, 1),
                rgba(255, 255, 255, 1),
                rgba(255, 255, 255, 0.6),
                transparent
            );
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.9), 0 0 12px rgba(255, 255, 255, 0.6);
            animation: shimmer-top 5s infinite;
            pointer-events: none;
            z-index: 10;
        }
        
        .ghost-button::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: -100%;
            width: 60%;
            height: 2px;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.6),
                rgba(255, 255, 255, 1),
                rgba(255, 255, 255, 1),
                rgba(255, 255, 255, 0.6),
                transparent
            );
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.9), 0 0 12px rgba(255, 255, 255, 0.6);
            animation: shimmer-bottom 5s infinite;
            pointer-events: none;
            z-index: 10;
        }
        
        @keyframes shimmer-top {
            0% {
                left: -100%;
            }
            8% {
                left: 150%;
            }
            100% {
                left: 150%;
            }
        }
        
        @keyframes shimmer-bottom {
            0% {
                left: -100%;
            }
            8% {
                left: 150%;
            }
            100% {
                left: 150%;
            }
        }
        
        .ghost-button:hover {
            border-color: rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.1);
            transform: translateY(-2px);
        }
        
        .ghost-button:hover::before {
            animation: shimmer-top 3s infinite;
        }
        
        .ghost-button:hover::after {
            animation: shimmer-bottom 3s infinite;
        }
        
        .home-content {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 1.4s ease-in, transform 1.4s ease-in;
        }
        
        .home-content.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .home-content.animate-delay-100 {
            transition-delay: 0.3s;
        }
        
        .home-content.animate-delay-200 {
            transition-delay: 0.6s;
        }
        
        .home-content.animate-delay-300 {
            transition-delay: 1s;
        }
        
        .home-content.animate-delay-400 {
            transition-delay: 1.4s;
        }
        
        .home-content.animate-delay-500 {
            transition-delay: 1.8s;
        }
        
        .home-content.animate-delay-600 {
            transition-delay: 2.2s;
        }
        
        .content {
            position: relative;
            z-index: 1;
            height: 100vh;
            overflow-y: auto;
        }
        
        /* Parallax animation styles */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-fade-in-up {
            animation: fadeInUp 0.8s ease-out forwards;
            opacity: 0;
        }
        
        .animate-delay-100 {
            animation-delay: 0.1s;
        }
        
        .animate-delay-200 {
            animation-delay: 0.2s;
        }
        
        .animate-delay-300 {
            animation-delay: 0.3s;
        }
        
        .animate-delay-400 {
            animation-delay: 0.4s;
        }
        
        .animate-delay-500 {
            animation-delay: 0.5s;
        }
        
        .animate-delay-600 {
            animation-delay: 0.6s;
        }
        
        .animate-delay-700 {
            animation-delay: 0.7s;
        }
        
        .animate-delay-800 {
            animation-delay: 0.8s;
        }
        
        .animate-delay-900 {
            animation-delay: 0.9s;
        }
        
        .animate-delay-1000 {
            animation-delay: 1.0s;
        }
     
    </style>

gress","yearChartSubtitle":"Month-by-month realized customer value ($B). Amber = current month in progress.","trackerLabelYear":"Realized Customer value","thisYearLabel":"this year","valueStart2025":5,"valueEnd2025":22,"ytd2026":7,"ytd2026JanShare":0.37,"ytd2026FebShare":0.63}}}</script>

    <script type="text/babel">
        const defaultContentEl = document.getElementById('default-content');
        const DEFAULT_CONTENT = defaultContentEl ? JSON.parse(defaultContentEl.textContent) : {};
        const { useState, useEffect } = React;

        // Icon Components
        const HomeIcon = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 9L12 2L21 9V20C21 20.5304 20.7893 21.0391 20.4142 21.4142C20.0391 21.7893 19.5304 22 19 22H5C4.46957 22 3.96086 21.7893 3.58579 21.4142C3.21071 21.0391 3 20.5304 3 20V9Z" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                <path d="M9 22V12H15V22" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
        );

        const ArrowLeft = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M19 12H5M5 12L12 19M5 12L12 5" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
        );

        const ArrowRight = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
        );

        const TargetIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="12" r="10" stroke="#3B82F6" strokeWidth="2"/>
                <circle cx="12" cy="12" r="6" stroke="#3B82F6" strokeWidth="2"/>
                <circle cx="12" cy="12" r="2" fill="#3B82F6"/>
            </svg>
        );

        const ShieldIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L4 6V12C4 17.55 7.16 22.74 12 24C16.84 22.74 20 17.55 20 12V6L12 2Z" stroke="#3B82F6" strokeWidth="2" fill="none"/>
                <path d="M12 12L10 10L8 12L12 16L16 12L14 10L12 12Z" fill="white" fillOpacity="0.8"/>
            </svg>
        );

        const RoadIcon = () => (
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 18L8 6L12 14L16 2L20 10" stroke="#3B82F6" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
                <circle cx="4" cy="18" r="2" fill="#3B82F6"/>
                <circle cx="20" cy="10" r="2" fill="#3B82F6"/>
            </svg>
        );

        const ArrowRightCard = () => (
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 12H19M19 12L12 5M19 12L12 19" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/>
            </svg>
        );

        // Share helper - opens SMS or Email
        const getShareData = () => {
            const url = typeof window !== 'undefined' ? window.location.href : '';
            const title = 'Cognite MoonShot';
            const text = '$100 Billion in realized customer value by 2035. Explore the mission.';
            return { url, title, text };
        };
        const handleShareAction = (method) => {
            const { url, title, text } = getShareData();
            const fullText = `${text} ${url}`;
            if (method === 'email') {
                window.location.href = `mailto:?subject=${encodeURIComponent(title)}&body=${encodeURIComponent(fullText)}`;
            } else if (method === 'sms') {
                window.location.href = `sms:?body=${encodeURIComponent(fullText)}`;
            }
        };
        const openShareMenu = (onShareClick) => {
            onShareClick();
        };

        // Header Component
        const Header = ({ onHomeClick, onShareClick, showBreadcrumb, breadcrumbText }) => (
            <div className="absolute top-0 left-0 right-0 z-10 flex justify-between items-start p-6">
                <div className="flex items-center space-x-4">
                    <img src="images/logo.png" alt="Logo" className="h-10 w-auto" />
                    {showBreadcrumb && (
                        <div className="text-white text-sm font-heading">
                            <span>Home</span>
                            <span className="text-blue-400"> {breadcrumbText}</span>
                        </div>
                    )}
                </div>
                <div className="flex items-center gap-2">
                    {onShareClick && (
                        <button
                            onClick={() => openShareMenu(onShareClick)}
                            className="w-10 h-10 rounded-full border border-white/40 bg-transparent flex items-center justify-center hover:border-white/70 hover:bg-white/5 transition-colors"
                            title="Share"
                        >
                            <i className="fas fa-share text-white text-lg"></i>
                        </button>
                    )}
                    <button
                        onClick={onHomeClick}
                        className="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center hover:bg-blue-700 transition-colors"
                    >
                        <HomeIcon />
                    </button>
                </div>
            </div>
        );

        // Bottom Navigation Component
        const BottomNav = ({ onPrev, onNext, currentPage, totalPages, pathTitle, enableNextOnLastScreen = false }) => {
            const isNextDisabled = enableNextOnLastScreen ? false : (currentPage === totalPages);
            return (
            <div className="fixed bottom-0 left-0 right-0 z-10 flex items-center justify-between p-6 backdrop-blur-md">
                <div className="flex items-center gap-3">
                    <button
                        onClick={onPrev}
                        disabled={currentPage === 1}
                        className={`w-12 h-12 rounded-lg flex items-center justify-center transition-colors ${
                            currentPage === 1 
                                ? 'bg-gray-700 cursor-not-allowed opacity-30' 
                                : 'bg-gray-800 opacity-80 hover:bg-gray-700'
                        }`}
                    >
                        <ArrowLeft />
                    </button>
                    <div className="text-right font-heading">
                        <span className="text-blue-400 text-sm font-normal">{pathTitle}</span>
                        <span className="text-white/80 text-sm ml-2">{currentPage}/{totalPages}</span>
                    </div>
                </div>
                <div className="flex items-center gap-3">
                    <span className="text-white/70 text-sm">swipe or</span>
                    <button
                        onClick={onNext}
                        disabled={isNextDisabled}
                        className={`w-12 h-12 rounded-lg flex items-center justify-center transition-colors ${
                            isNextDisabled 
                                ? 'bg-gray-700 cursor-not-allowed opacity-50' 
                                : 'bg-blue-600 hover:bg-blue-700'
                        }`}
                    >
                        <ArrowRight />
                    </button>
                </div>
            </div>
            );
        };

        // Home Page
        const HomePage = ({ content = {}, onPathClick, onShareClick, onLocaleChange, currentLocale = 'en', showContentImmediately = false, contentLoading = false, contentError = null }) => {
            const home = content.title != null ? content : DEFAULT_CONTENT.home;
            const { useState, useEffect, useRef } = React;
            const [contentVisible, setContentVisible] = useState(showContentImmediately);
            const [buttonVisible, setButtonVisible] = useState(!showContentImmediately);
            const [isFadingOut, setIsFadingOut] = useState(false);
            const [runEntryAnimation, setRunEntryAnimation] = useState(!showContentImmediately);
            const [langMenuOpen, setLangMenuOpen] = useState(false);
            const langMenuRef = useRef(null);
            
            const handleButtonClick = () => {
                // Hide button first
                setButtonVisible(false);
                
                // First show the gradient overlay
                const overlay = document.querySelector('.gradient-overlay');
                if (overlay) {
                    overlay.classList.add('visible');
                }
                
                // Then show content after a short delay so entry animation runs
                setTimeout(() => {
                    setContentVisible(true);
                }, 300);
            };
            
            // Show content and re-trigger entry animation when coming from a path
            useEffect(() => {
                if (showContentImmediately) {
                    const overlay = document.querySelector('.gradient-overlay');
                    if (overlay) {
                        overlay.classList.add('visible');
                    }
                    setButtonVisible(false);
                    setContentVisible(true);
                    setRunEntryAnimation(false);
                    const t = setTimeout(() => setRunEntryAnimation(true), 50);
                    return () => clearTimeout(t);
                }
            }, [showContentImmediately]);
            
            // Reset to button state when showContentImmediately becomes false (navigating to path)
            useEffect(() => {
                if (!showContentImmediately && contentVisible) {
                    setIsFadingOut(true);
                    const overlay = document.querySelector('.gradient-overlay');
                    if (overlay) {
                        overlay.classList.remove('visible');
                    }
                    const t = setTimeout(() => {
                        setContentVisible(false);
                        setIsFadingOut(false);
                        setButtonVisible(true);
                        setRunEntryAnimation(true);
                    }, 800);
                    return () => clearTimeout(t);
                }
            }, [showContentImmediately]);
            
            // Handle fade out when resetting (triggered by parent)
            useEffect(() => {
                // This will be triggered when the app resets
                const handleReset = () => {
                    setIsFadingOut(true);
                    const overlay = document.querySelector('.gradient-overlay');
                    if (overlay) {
                        overlay.classList.remove('visible');
                    }
                    setTimeout(() => {
                        setContentVisible(false);
                        setIsFadingOut(false);
                        setButtonVisible(true);
                    }, 800);
                };
                
                // Listen for reset events (we'll trigger this from App component)
                window.addEventListener('app-reset', handleReset);
                return () => window.removeEventListener('app-reset', handleReset);
            }, []);
            useEffect(() => {
                if (!langMenuOpen) return;
                const close = (e) => {
                    if (langMenuRef.current && !langMenuRef.current.contains(e.target)) setLangMenuOpen(false);
                };
                document.addEventListener('click', close);
                return () => document.removeEventListener('click', close);
            }, [langMenuOpen]);

            return (
                <div className="content flex flex-col items-center justify-center min-h-screen px-6 py-12 relative">
                    <button 
                        onClick={handleButtonClick}
                        className="ghost-button"
                        style={{ 
                            position: 'absolute',
                            bottom: '33.33%',
                            transform: 'translateY(50%)',
                            opacity: buttonVisible ? 1 : 0,
                            transition: 'opacity 0.8s ease-out',
                            pointerEvents: buttonVisible ? 'auto' : 'none',
                            zIndex: buttonVisible ? 10 : 1,
                            display: 'flex',
                            alignItems: 'center',
                            gap: '0.75rem'
                        }}
                    >
                        <img src="images/logo.png" alt="Logo" className="h-6 w-auto relative z-10" />
                        <span className="relative z-10 font-heading">Moonshot</span>
                    </button>
                    {contentVisible && (
                        // Content state: Show all elements with animations

                    const actualPointBg = actualPoints.map((_, i) => i === n - 1 ? 'rgba(245, 158, 11, 0.95)' : 'rgba(59, 130, 246, 0.9)');
                    const actualPointRadius = actualPoints.map((_, i) => i === n - 1 ? 8 : 4);
                    if (chartInstance.current) chartInstance.current.destroy();
                    chartInstance.current = new Chart(chartRef.current, {
                        type: 'line',
                        data: {
                            datasets: [
                                { label: 'Target ($100B by ' + dueYear + ')', data: targetData, borderColor: 'rgba(148, 163, 184, 0.8)', backgroundColor: 'rgba(148, 163, 184, 0.1)', borderWidth: 2, borderDash: [6, 4], fill: false, tension: 0, pointRadius: 0, pointHoverRadius: 4 },
                                { label: 'Actual', data: actualPoints, borderColor: 'rgba(59, 130, 246, 1)', backgroundColor: actualPointBg, borderWidth: 2, fill: false, tension: 0.2, pointRadius: actualPointRadius, pointHoverRadius: (ctx) => ctx.dataIndex === n - 1 ? 10 : 6, spanGaps: false }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: { intersect: false, mode: 'index' },
                            plugins: {
                                legend: { position: 'top', labels: { color: '#e2e8f0', font: { size: 12 } } },
                                tooltip: {
                                    filter: function(tooltipItem) { return tooltipItem.datasetIndex === 1; },
                                    padding: 14,
                                    titleSpacing: 10,
                                    bodySpacing: 8,
                                    boxPadding: 8,
                                    titleFont: { size: 14, weight: '600' },
                                    bodyFont: { size: 13 },
                                    bodyAlign: 'left',
                                    titleAlign: 'left',
                                    backgroundColor: 'rgba(30, 41, 59, 0.96)',
                                    borderColor: 'rgba(71, 85, 105, 0.8)',
                                    borderWidth: 1,
                                    cornerRadius: 8,
                                    callbacks: {
                                        title: function(tooltipItems) {
                                            const item = tooltipItems[0];
                                            const i = item.dataIndex;
                                            if (i === 0) return '2025';
                                            if (i === 1) return '2025 - 2026';
                                            return '01/01/2026 - Today';
                                        },
                                        label: function(tooltipItem) {
                                            if (tooltipItem.datasetIndex !== 1) return tooltipItem.formattedValue || '';
                                            const i = tooltipItem.dataIndex;
                                            if (i === 0) return 'Year total: $' + valueStart2025 + 'B';
                                            if (i === 1) return 'Year total: $' + valueEnd2025 + 'B';
                                            return 'Year to date: $' + ytd2026 + 'B';
                                        },
                                        afterLabel: function(tooltipItem) {
                                            if (tooltipItem.datasetIndex === 1 && tooltipItem.dataIndex === n - 1) return 'Total: $' + currentB + 'B';
                                            return '';
                                        },
                                        labelPointStyle: function(tooltipItem) {
                                            if (tooltipItem.datasetIndex !== 1) return {};
                                            const isOrange = tooltipItem.dataIndex === n - 1;
                                            return { pointStyle: 'circle', backgroundColor: isOrange ? 'rgba(245, 158, 11, 1)' : 'rgba(59, 130, 246, 1)' };
                                        }
                                    }
                                }
                            },
                            scales: {
                                x: {
                                    type: 'linear',
                                    min: startYear,
                                    max: dueYear,
                                    ticks: { stepSize: 1, color: '#94a3b8', maxRotation: 0 },
                                    grid: { color: 'rgba(71, 85, 105, 0.5)' }
                                },
                                y: { min: 0, max: goalB, grid: { color: 'rgba(71, 85, 105, 0.5)' }, ticks: { color: '#94a3b8', callback: function(v) { return '$' + v + 'B'; } } }
                            }
                        }
                    });
                    return () => { if (chartInstance.current) { chartInstance.current.destroy(); chartInstance.current = null; } };
                }
                if (activeTab === 'current-year' && yearChartRef.current) {
                    if (chartInstance.current) { chartInstance.current.destroy(); chartInstance.current = null; }
                    const months = monthNames.slice();
                    const barData = monthlyValue2026.map((v, i) => i <= currentMonth ? v : null);
                    const barBgColors = monthNames.map((_, i) => {
                        if (i > currentMonth) return 'rgba(71, 85, 105, 0.15)';
                        if (i === currentMonth) return 'rgba(245, 158, 11, 0.85)';
                        return 'rgba(59, 130, 246, 0.75)';
                    });
                    const barBorderColors = monthNames.map((_, i) => {
                        if (i === currentMonth) return 'rgba(245, 158, 11, 1)';
                        return 'rgba(59, 130, 246, 1)';
                    });
                    if (yearChartInstance.current) yearChartInstance.current.destroy();
                    yearChartInstance.current = new Chart(yearChartRef.current, {
                        type: 'bar',
                        data: {
                            labels: months,
                            datasets: [{
                                label: 'Realized customer value ($B)',
                                data: barData,
                                backgroundColor: barBgColors,
                                borderColor: barBorderColors,
                                borderWidth: 1,
                                borderRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            interaction: { intersect: false, mode: 'index' },
                            plugins: {
                                legend: { position: 'top', labels: { color: '#e2e8f0', font: { size: 12 } } }
                            },
                            scales: {
                                x: {
                                    grid: { display: false },
                                    ticks: { color: '#94a3b8', maxRotation: 0 }
                                },
                                y: {
                                    min: 0,
                                    grid: { color: 'rgba(71, 85, 105, 0.5)' },
                                    ticks: {
                                        color: '#94a3b8',
                                        callback: function(v) { return '$' + v + 'B'; }
                                    }
                                }
                            }
                        }
                    });
                    return () => { if (yearChartInstance.current) { yearChartInstance.current.destroy(); yearChartInstance.current = null; } };
                }
            }, [activeTab]);
            
            return (
                <div className="content min-h-screen px-8 pt-28 pb-32">
                    <Header onHomeClick={onHome} onShareClick={onShare} showBreadcrumb={false} breadcrumbText={content.breadcrumb || 'How we get there'} />
                    <div className="max-w-4xl mx-auto">
                        <h1 className="text-white text-4xl font-bold mb-2 animate-fade-in-up font-heading">{c3.headline || 'Customer value to date'}</h1>
                        <p className="text-white/80 text-lg mb-6 animate-fade-in-up animate-delay-100">{c3.subhead || 'Progress toward $100B realized customer value by 2035.'}</p>
                        <div className="flex gap-1 mb-6 animate-fade-in-up animate-delay-200">
                            <button
                                onClick={() => setActiveTab('overview')}
                                className={`px-4 py-2.5 rounded-lg text-sm font-medium transition-colors ${activeTab === 'overview' ? 'bg-blue-600 text-white' : 'bg-slate-700/60 text-slate-400 hover:text-white hover:bg-slate-600/60'}`}
                            >
                                {c3.tabOverview || 'Overview'}
                            </button>
                            <button
                                onClick={() => setActiveTab('current-year')}
                                className={`px-4 py-2.5 rounded-lg text-sm font-medium transition-colors ${activeTab === 'current-year' ? 'bg-blue-600 text-white' : 'bg-slate-700/60 text-slate-400 hover:text-white hover:bg-slate-600/60'}`}
                            >
                                {currentYear} {c3.tabCurrentYear || '(current year)'}
                            </button>
                        </div>
                        <div style={{ display: activeTab === 'overview' ? 'block' : 'none' }}>
                            <div className="rounded-2xl border border-slate-600/60 bg-slate-800/40 p-6 animate-fade-in-up animate-delay-300">
                                <div className="text-white font-semibold text-lg mb-4">{c3.chartTitleOverview || 'Timeline & value'}</div>
                                <div style={{ height: '420px' }}>
                                    <canvas ref={chartRef}></canvas>
                                </div>
                            </div>
                            <div className="relative rounded-2xl overflow-hidden animate-fade-in-up animate-delay-400 mt-6 p-6 bg-blue-900/90 border border-slate-600/40">
                                <div className="absolute top-0 right-0 w-32 h-32 rounded-full bg-blue-500/20 -translate-y-1/2 translate-x-1/2" />
                                <div className="absolute top-0 right-8 w-24 h-24 rounded-full bg-blue-400/15 -translate-y-1/2 translate-x-1/2" />
                                <div className="relative">
                                    <div className="text-white text-3xl font-bold mb-1">{currentB} / {goalB}B</div>
                                    <div className="text-white/90 text-sm mb-6">{c3.trackerLabelOverview || 'Realized Customer value'}</div>
                                    <div className="flex items-center justify-between flex-wrap gap-3">
                                        <span className={`inline-block px-4 py-1.5 rounded-lg text-sm font-semibold uppercase text-white ${riskStatus === 'on-track' ? 'bg-green-500' : riskStatus === 'moderate' ? 'bg-amber-500' : 'bg-red-500'}`}>
                                            {riskLabel.toUpperCase()}
                                        </span>
                                        <span className="text-white/90 text-sm">{dueYear - currentYear} {c3.yearsRemainingLabel || 'years remaining'}</span>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Current year tab - granular monthly view */}
                        <div style={{ display: activeTab === 'current-year' ? 'block' : 'none' }}>
                            <div className="rounded-2xl border border-slate-600/60 bg-slate-800/40 p-6 animate-fade-in-up animate-delay-300">
                                <div className="text-white font-semibold text-lg mb-2">{currentYear} {c3.chartTitleYear || 'progress'}</div>
                                <p className="text-slate-400 text-sm mb-4">{c3.yearChartSubtitle || 'Month-by-month realized customer value ($B). Amber = current month in progress.'}</p>
                                <div style={{ height: '380px' }}>
                                    <canvas ref={yearChartRef}></canvas>
                                </div>
                            </div>
                            {/* Year view tracker card */}
                            {(() => {
                                const ytdValue = monthlyValue2026.slice(0, currentMonth + 1).reduce((a, b) => (a || 0) + (b || 0), 0).toFixed(1);
                                const monthsElapsed = currentMonth + 1;
                                return (
                                    <div className="relative rounded-2xl overflow-hidden mt-6 p-6 animate-fade-in-up animate-delay-400 bg-blue-600 border border-blue-500/30">
                                        <div className="absolute top-0 right-0 w-28 h-28 rounded-full bg-blue-400/30 -translate-y-1/2 translate-x-1/2" />
                                        <div className="relative">
                                            <div className="text-white text-3xl font-bold mb-1">{ytdValue}B {c3.thisYearLabel || 'this year'}</div>
                                            <div className="text-white/95 text-sm mb-6">{c3.trackerLabelYear || 'Realized Customer value'}</div>
                                            <div className="flex items-center justify-between flex-wrap gap-3">
                                                <span className={`inline-block px-4 py-2 rounded-full text-sm font-medium ${riskStatus === 'on-track' ? 'bg-green-400/90 text-green-900' : riskStatus === 'moderate' ? 'bg-amber-400/90 text-amber-900' : 'bg-red-400/90 text-red-900'}`}>
                                                    {riskLabel.toUpperCase()}
                                                </span>
                                                <span className="text-white/95 text-sm">{monthsElapsed} month{monthsElapsed !== 1 ? 's' : ''}</span>
                                            </div>
                                        </div>
                                    </div>
                                );
                            })()}
                        </div>
                    </div>

                    <BottomNav 
                        onPrev={onPrev} 
                        onNext={onNext} 
                        currentPage={3} 
                        totalPages={3} 
                        pathTitle={content.pathTitle || 'How we get there'}
                        enableNextOnLastScreen={true}
                    />
                </div>
            );
        };

// Initial navigation state from URL hash (for CMS iframe deep linking)
            const getInitialNavFromHash = () => {
                const h = (typeof window !== 'undefined' && window.location.hash || '').replace(/^#/, '');
                if (h === 'home') return { view: 'home', path: null, screen: 1, fromPath: true };
                if (!h) return { view: 'home', path: null, screen: 1, fromPath: false };
                const m = h.match(/^(what|why|how)-(\d)$/);
                if (m) return { view: 'path', path: m[1], screen: Math.min(3, Math.max(1, parseInt(m[2], 10))), fromPath: true };
                return { view: 'home', path: null, screen: 1, fromPath: false };
            };
            const initialNav = getInitialNavFromHash();
            const LOCALE_STORAGE_KEY = 'moonshot-locale';
            const getInitialLocale = () => {
                try {
                    const params = typeof window !== 'undefined' && window.location && window.location.search ? new URLSearchParams(window.location.search) : null;
                    const fromUrl = params && (params.get('locale') === 'no' || params.get('locale') === 'ja') ? params.get('locale') : null;
                    if (fromUrl) {
                        try { localStorage.setItem(LOCALE_STORAGE_KEY, fromUrl); } catch (e) {}
                        return fromUrl;
                    }
                    const s = typeof localStorage !== 'undefined' ? localStorage.getItem(LOCALE_STORAGE_KEY) : null;
                    return (s === 'no' || s === 'ja') ? s : 'en';
                } catch (e) { return 'en'; }
            };
        const App = () => {
            const { useRef, useEffect } = React;
            const [locale, setLocaleState] = useState(getInitialLocale);
            const setLocale = (next) => {
                setLocaleState(next);
                try { localStorage.setItem(LOCALE_STORAGE_KEY, next); } catch (e) {}
            };
            const [content, setContent] = useState(DEFAULT_CONTENT);
            const [contentLoading, setContentLoading] = useState(false);
            const [contentError, setContentError] = useState(null);
            const [currentView, setCurrentView] = useState(initialNav.view);
            const [currentPath, setCurrentPath] = useState(initialNav.path);
            const [currentScreen, setCurrentScreen] = useState(initialNav.screen);
            const [hasNavigatedFromPath, setHasNavigatedFromPath] = useState(initialNav.fromPath);
            const [shareMenuOpen, setShareMenuOpen] = useState(false);
            const inactivityTimerRef = useRef(null);
            const swipeStartRef = useRef({ x: 0, y: 0 });
            const localeRef = useRef(locale);
            localeRef.current = locale;
            // Fetch content from API by locale; on failure keep previous content and show error. Only apply result if it still matches current locale (avoid race).
            useEffect(() => {
                var requestedLocale = locale;
                setContentLoading(true);
                setContentError(null);
                fetch('/api/content?locale=' + encodeURIComponent(locale), { cache: 'no-store' })
                    .then(function(r) {
                        if (!r.ok) throw new Error('Content fetch failed');
                        const ct = r.headers.get('Content-Type') || '';
                        if (!ct.includes('application/json')) throw new Error('Invalid content type');
                        return r.json();
                    })
                    .then(function(data) {
                        if (localeRef.current !== requestedLocale) {
                            setContentLoading(false);
                            return;
                        }
                        var merged = {
                            home: data.home != null ? data.home : DEFAULT_CONTENT.home,
                            what: data.what != null ? data.what : DEFAULT_CONTENT.what,
                            why: data.why != null ? data.why : DEFAULT_CONTENT.why,
                            how: data.how != null ? data.how : DEFAULT_CONTENT.how
                        };
                        var ws1 = merged.what && merged.what.screen1;
                        if (ws1 && (ws1.valueAssuranceTitle != null || (ws1.cardTitle == null && (ws1.headline != null || ws1.mainContent != null)))) {
                            merged = { ...merged, what: { ...merged.what, screen1: DEFAULT_CONTENT.what && DEFAULT_CONTENT.what.screen1 ? DEFAULT_CONTENT.what.screen1 : ws1 } };
                        }
                        setContent(merged);
                        setContentLoading(false);
                    })
                    .catch(function() {
                        setContentLoading(false);
                        if (localeRef.current === requestedLocale) setContentError('Could not load this language. Please try again.');
                    });
            }, [locale]);
            // Keep gradient overlay visible on path screens (so content is readable over video), including when opened via hash (e.g. CMS preview)
            useEffect(() => {
                const overlay = document.querySelector('.gradient-overlay');
                if (!overlay) return;
                if (currentView === 'path') overlay.classList.add('visible');
                // When home, overlay is managed by HomePage and resetToHomeButton
            }, [currentView]);
            const handleShareClick = () => {
                openShareMenu(() => setShareMenuOpen(true));
            };
            
            const resetToHomeButton = () => {
                // Always reset navigation state first
                setCurrentView('home');
                setCurrentPath(null);
                setCurrentScreen(1);
                setHasNavigatedFromPath(false);
                
                // Hide gradient overlay
                const overlay = document.querySelector('.gradient-overlay');
                if (overlay) {
                    overlay.classList.remove('visible');
                }
                
                // Trigger reset event to fade out home page content if visible
                window.dispatchEvent(new Event('app-reset'));
            };
            
            const resetInactivityTimer = () => {
                // Clear existing timer
                if (inactivityTimerRef.current) {
                    clearTimeout(inactivityTimerRef.current);
                }
                
                // Set timer for 30 seconds - works on all screens
                inactivityTimerRef.current = setTimeout(() => {
                    resetToHomeButton();
                }, 120000); // 2 minutes
            };
            
            // Track user activity on all screens
            useEffect(() => {
                // Reset timer whenever view changes
                resetInactivityTimer();
                
                const activityEvents = ['mousedown', 'mousemove', 'keypress', 'scroll', 'touchstart', 'click'];
                
                const handleActivity = () => {
                    resetInactivityTimer();
                };
                
                // Add event listeners
                activityEvents.forEach(event => {
                    window.addEventListener(event, handleActivity);
                });
                
                // Cleanup
                return () => {
                    activityEvents.forEach(event => {
                        window.removeEventListener(event, handleActivity);
                    });
                    if (inactivityTimerRef.current) {
                        clearTimeout(inactivityTimerRef.current);
                    }
                };
            }, [currentView, currentPath, currentScreen]);

            const handlePathClick = (pathId) => {
                setCurrentPath(pathId);
                setCurrentScreen(1);
                setCurrentView('path');
                setHasNavigatedFromPath(true);
            };

            const handleGoToValueChart = () => {
                setCurrentPath('how');
                setCurrentScreen(1);
                setCurrentView('path');
                setHasNavigatedFromPath(true);
            };

            const handleHome = () => {
                setCurrentView('home');
                setCurrentPath(null);
                setCurrentScreen(1);
                // Keep hasNavigatedFromPath true so content shows
            };

            const handleNext = () => {
                if (currentPath === 'what' && currentScreen < 3) {
                    setCurrentScreen(currentScreen + 1);
                } else if (currentPath === 'what' && currentScreen === 3) {
                    setCurrentPath('why');
                    setCurrentScreen(1);
                } else if (currentPath === 'why' && currentScreen < 3) {
                    setCurrentScreen(currentScreen + 1);
                } else if (currentPath === 'why' && currentScreen === 3) {
                    setCurrentPath('how');
                    setCurrentScreen(1);
                } else if (currentPath === 'how') {
                    setCurrentView('home');
                    setCurrentPath(null);
                    setCurrentScreen(1);
                }
            };

            const handlePrev = () => {
                if (currentPath === 'how' && currentScreen === 1) {
                    setCurrentPath('why');
                    setCurrentScreen(3);
                } else if (currentScreen > 1) {
                    setCurrentScreen(currentScreen - 1);
                } else {
                    handleHome();
                }
            };

            const SWIPE_THRESHOLD = 50;
            const handleTouchStart = (e) => {
                if (e.touches && e.touches.length) {
                    swipeStartRef.current = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                }
            };
            const handleTouchEnd = (e) => {
                if (!e.changedTouches || !e.changedTouches.length) return;
                const endX = e.changedTouches[0].clientX;
                const endY = e.changedTouches[0].clientY;
                const dx = endX - swipeStartRef.current.x;
                const dy = endY - swipeStartRef.current.y;
                if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > SWIPE_THRESHOLD) {
                    if (dx < 0) handleNext();
                    else handlePrev();
                }
            };

            const renderView = () => {
                if (currentView === 'home') {
                    return <HomePage content={content.home} onPathClick={handlePathClick} onShareClick={handleShareClick} onLocaleChange={setLocale} currentLocale={locale} showContentImmediately={hasNavigatedFromPath} contentLoading={contentLoading} contentError={contentError} />;
                }
                if (currentPath === 'what') {
                    if (currentScreen === 1) return <WhatScreen1 content={content.what} onNext={handleNext} onHome={handleHome} onShare={handleShareClick} />;
                    if (currentScreen === 2) return <WhatScreen2 content={content.what} onPrev={handlePrev} onNext={handleNext} onHome={handleHome} onShare={handleShareClick} />;
                    if (currentScreen === 3) return <WhatScreen3 content={content.what} onPrev={handlePrev} onNext={handleNext} onHome={handleHome} onShare={handleShareClick} />;
                }
                if (currentPath === 'why') {
                    if (currentScreen === 1) return <WhyScreen1 content={content.why} onNext={handleNext} onHome={handleHome} onShare={handleShareClick} />;
                    if (currentScreen === 2) return <WhyScreen2 content={content.why} onPrev={handlePrev} onNext={handleNext} onHome={handleHome} onShare={handleShareClick} />;
                    if (currentScreen === 3) return <WhyScreen3 content={content.why} onPrev={handlePrev} onNext={handleNext} onHome={handleHome} onShare={handleShareClick} />;
                }
                if (currentPath === 'how') {
                    return <HowScreen1 content={content.how} onPrev={handlePrev} onNext={handleNext} onHome={handleHome} onShare={handleShareClick} />;
                }
                return <HomePage content={content.home} onPathClick={handlePathClick} onShareClick={handleShareClick} onLocaleChange={setLocale} currentLocale={locale} showContentImmediately={true} contentLoading={contentLoading} contentError={contentError} />;
            };

            const pathContent = renderView();
            const isStandalone = typeof window !== 'undefined' && (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true);
            const isMobile = typeof navigator !== 'undefined' && /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            const isIOS = typeof navigator !== 'undefined' && /iPad|iPhone|iPod/.test(navigator.userAgent) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            const canShowInstall = !isStandalone && isMobile;
            const [showIOSInstallHint, setShowIOSInstallHint] = useState(false);
            const shareModal = shareMenuOpen && (
                <div 
                    className="fixed inset-0 z-50 flex items-center justify-center bg-black/60 backdrop-blur-sm"
                    onClick={() => { setShareMenuOpen(false); setShowIOSInstallHint(false); }}
                >
                    <div 
                        className="bg-slate-800 rounded-2xl p-6 shadow-xl border border-slate-600 max-w-xs w-full mx-4"
                        onClick={(e) => e.stopPropagation()}
                    >
                        <h3 className="text-white font-semibold mb-4">Share</h3>
                        <div className="flex flex-col gap-2">
                            <button
                                onClick={() => { handleShareAction('email'); setShareMenuOpen(false); }}
                                className="flex items-center gap-3 w-full px-4 py-3 rounded-lg bg-slate-700 hover:bg-slate-600 text-white transition-colors"
                            >
                                <i className="fas fa-envelope text-blue-400"></i>
                                <span>Email</span>
                            </button>
                            <button
                                onClick={() => { handleShareAction('sms'); setShareMenuOpen(false); }}
                                className="flex items-center gap-3 w-full px-4 py-3 rounded-lg bg-slate-700 hover:bg-slate-600 text-white transition-colors"
                            >
                                <i className="fas fa-comment-sms text-blue-400"></i>
                                <span>SMS</span>
                            </button>
                            {canShowInstall && (
                                <button
                                    onClick={() => {
                                        if (window.__deferredInstallPrompt) {
                                            window.__deferredInstallPrompt.prompt();
                                            window.__deferredInstallPrompt.userChoice.then(() => { window.__deferredInstallPrompt = null; });
                                            setShareMenuOpen(false);
                                        } else if (isIOS) {
                                            setShowIOSInstallHint(true);
                                        } else {
                                            setShareMenuOpen(false);
                                        }
                                    }}
                                    className="flex items-center gap-3 w-full px-4 py-3 rounded-lg bg-slate-700 hover:bg-slate-600 text-white transition-colors"
                                >
                                    <i className="fas fa-mobile-screen-button text-blue-400"></i>
                                    <span>Add to Home Screen</span>
                                </button>
                            )}
                        </div>
                        {showIOSInstallHint && (
                            <p className="mt-3 text-sm text-slate-300 bg-slate-700/50 rounded-lg p-3">
                                In Safari, tap the <strong>Share</strong> icon (square with arrow), then <strong>Add to Home Screen</strong>.
                            </p>
                        )}
                        <button
                            onClick={() => { setShareMenuOpen(false); setShowIOSInstallHint(false); }}
                            className="mt-4 w-full py-2 text-gray-400 hover:text-white text-sm"
                        >
                            Cancel
                        </button>
                    </div>
                </div>
            );
            if (currentView === 'path') {
                return (
                    <>
                        <div 
                            key={locale}
                            style={{ width: '100%', height: '100%', minHeight: '100vh', position: 'relative' }} 
                            onTouchStart={handleTouchStart} 
                            onTouchEnd={handleTouchEnd}
                        >
                            {pathContent}
                        </div>
                        {shareModal}
                    </>
                );
            }
            return (
                <React.Fragment key={locale}>
                    {pathContent}
                    {shareModal}
                </React.Fragment>
            );
        };

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>

    <script>
        // Ensure video plays
        const video = document.getElementById('bg-video');
        if (video) {
            video.addEventListener('loadeddata', () => {
                video.play().catch(err => {
                    console.log('Video autoplay prevented:', err);
                });
            });
            video.addEventListener('canplay', () => {
                video.play().catch(err => {
                    console.log('Video play on canplay failed:', err);
                });
            });
            video.play().catch(err => {
                console.log('Initial play attempt:', err);
            });
        }

        // Fullscreen functionality
        function requestFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) {
                elem.requestFullscreen();
            } else if (elem.webkitRequestFullscreen) {
                elem.webkitRequestFullscreen();
            } else if (elem.msRequestFullscreen) {
                elem.msRequestFullscreen();
            } else if (elem.mozRequestFullScreen) {
                elem.mozRequestFullScreen();
            }
        }

        window.addEventListener('load', () => {
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('/sw.js').catch(function() {});
            }
            setTimeout(() => {
                requestFullscreen();
            }, 500);
        });

        document.addEventListener('click', () => {
            if (!document.fullscreenElement && 
                !document.webkitFullscreenElement && 
                !document.msFullscreenElement && 
                !document.mozFullScreenElement) {
                requestFullscreen();
            }
        }, { once: true });
    </script>
</body>
</html>
